<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | ShredFX</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="firebase-config.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --mint: #52b788;
            --mint-dark: #2d6a4f;
            --mint-soft: #d8f3dc;
            --black: #081c15;
            --charcoal: #1b4332;
            --white: #ffffff;
            --gradient: linear-gradient(135deg, #52b788 0%, #2d6a4f 100%);
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: linear-gradient(135deg, #d8f3dc 0%, #b7e4c7 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .auth-container {
            width: 100%;
            max-width: 450px;
        }

        .auth-card {
            background: white;
            border-radius: 32px;
            padding: 40px 30px;
            box-shadow: 0 20px 40px rgba(29, 67, 50, 0.2);
            border: 2px solid var(--mint);
        }

        .auth-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .auth-header img {
            height: 60px;
            margin-bottom: 15px;
        }

        .auth-header h2 {
            font-size: 1.8rem;
            color: var(--black);
            font-family: 'Syne', sans-serif;
        }

        .auth-header span {
            color: var(--mint);
        }

        .tab-container {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            background: var(--mint-soft);
            padding: 5px;
            border-radius: 50px;
        }

        .tab-btn {
            flex: 1;
            padding: 12px;
            border: none;
            background: transparent;
            font-weight: 600;
            font-size: 1rem;
            border-radius: 50px;
            cursor: pointer;
            color: var(--charcoal);
            font-family: inherit;
            transition: all 0.3s;
        }

        .tab-btn.active {
            background: white;
            color: var(--mint-dark);
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .form-container {
            display: block;
        }

        .form-container.hidden {
            display: none;
        }

        .form-group {
            margin-bottom: 20px;
            position: relative;
        }

        .form-group label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--mint-dark);
        }

        .form-group input {
            width: 100%;
            padding: 14px;
            background: var(--mint-soft);
            border: 2px solid #95d5b2;
            border-radius: 16px;
            font-size: 1rem;
            font-family: inherit;
            transition: all 0.3s;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--mint);
            background: white;
        }

        .password-toggle {
            position: absolute;
            right: 15px;
            top: 42px;
            cursor: pointer;
            color: var(--mint-dark);
        }

        .action-btn {
            width: 100%;
            padding: 14px;
            background: var(--gradient);
            color: white;
            border: none;
            border-radius: 40px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            margin-top: 10px;
            font-family: inherit;
            transition: all 0.2s;
        }

        .action-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(45, 106, 79, 0.2);
        }

        .action-btn:active {
            transform: scale(0.98);
        }

        .action-btn:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }

        .divider {
            display: flex;
            align-items: center;
            text-align: center;
            margin: 25px 0;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid var(--mint-soft);
        }

        .divider span {
            padding: 0 15px;
            color: #5a6e64;
            font-size: 0.85rem;
            font-weight: 600;
        }

        .google-btn {
            width: 100%;
            padding: 14px;
            background: white;
            border: 2px solid var(--mint);
            border-radius: 40px;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            color: var(--charcoal);
            font-family: inherit;
            transition: all 0.2s;
        }

        .google-btn:hover {
            background: var(--mint-soft);
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(45, 106, 79, 0.15);
        }

        .google-btn i {
            font-size: 1.2rem;
            color: #DB4437;
        }

        .forgot-link {
            text-align: right;
            margin-top: -10px;
            margin-bottom: 10px;
        }

        .forgot-link span {
            color: var(--mint-dark);
            font-size: 0.85rem;
            cursor: pointer;
            font-weight: 600;
        }

        .forgot-link span:hover {
            text-decoration: underline;
        }

        .message {
            text-align: center;
            margin-top: 20px;
            padding: 12px;
            border-radius: 12px;
            display: none;
            font-size: 0.85rem;
            animation: slideIn 0.3s ease;
        }

        .message.error {
            background: #ffebee;
            color: #c62828;
            display: block;
            border-left: 4px solid #c62828;
        }

        .message.success {
            background: #e8f5e9;
            color: #2e7d32;
            display: block;
            border-left: 4px solid #2e7d32;
        }

        .back-link {
            text-align: center;
            margin-top: 25px;
        }

        .back-link a {
            color: var(--mint);
            text-decoration: none;
            font-weight: 600;
            transition: color 0.2s;
        }

        .back-link a:hover {
            color: var(--mint-dark);
        }

        .loading-spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid white;
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            margin-right: 8px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Responsive */
        @media (max-width: 480px) {
            .auth-card {
                padding: 30px 20px;
            }
            
            .auth-header h2 {
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <img src="https://ik.imagekit.io/5xwchyocd7/New%20Project%202%20_2B803B3_.png?updatedAt=1773053119572" alt="ShredFX">
                <h2>SHRED<span>FX</span></h2>
            </div>
            
            <div class="tab-container">
                <button class="tab-btn active" id="loginTabBtn">Login</button>
                <button class="tab-btn" id="signupTabBtn">Sign Up</button>
            </div>
            
            <!-- Login Form -->
            <div id="loginForm" class="form-container">
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="loginEmail" placeholder="your@email.com" autocomplete="email">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="loginPassword" placeholder="••••••••" autocomplete="current-password">
                    <i class="far fa-eye password-toggle" id="toggleLoginPassword"></i>
                </div>
                <div class="forgot-link">
                    <span id="forgotPassword">Forgot password?</span>
                </div>
                <button class="action-btn" id="loginBtn">Login</button>
                
                <div class="divider">
                    <span>OR SIGN IN WITH GOOGLE</span>
                </div>
                
                <button class="google-btn" id="googleLoginBtn">
                    <i class="fab fa-google"></i> Sign in with Google
                </button>
            </div>
            
            <!-- Signup Form -->
            <div id="signupForm" class="form-container hidden">
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" id="signupName" placeholder="John Doe" autocomplete="name">
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="signupEmail" placeholder="your@email.com" autocomplete="email">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="signupPassword" placeholder="••••••••" autocomplete="new-password">
                    <i class="far fa-eye password-toggle" id="toggleSignupPassword"></i>
                </div>
                <div class="form-group">
                    <label>Confirm Password</label>
                    <input type="password" id="signupConfirmPassword" placeholder="••••••••" autocomplete="new-password">
                    <i class="far fa-eye password-toggle" id="toggleConfirmPassword"></i>
                </div>
                <button class="action-btn" id="signupBtn">Create Account</button>
                
                <div class="divider">
                    <span>OR SIGN UP WITH GOOGLE</span>
                </div>
                
                <button class="google-btn" id="googleSignupBtn">
                    <i class="fab fa-google"></i> Sign up with Google
                </button>
            </div>
            
            <div id="messageBox" class="message"></div>
            
            <div class="back-link">
                <a href="index.html">← Back to Home</a>
            </div>
        </div>
    </div>

    <script>
        // Get DOM elements
        const loginTab = document.getElementById('loginTabBtn');
        const signupTab = document.getElementById('signupTabBtn');
        const loginForm = document.getElementById('loginForm');
        const signupForm = document.getElementById('signupForm');
        const loginBtn = document.getElementById('loginBtn');
        const signupBtn = document.getElementById('signupBtn');
        const forgotBtn = document.getElementById('forgotPassword');
        const googleLoginBtn = document.getElementById('googleLoginBtn');
        const googleSignupBtn = document.getElementById('googleSignupBtn');
        const messageBox = document.getElementById('messageBox');
        
        // Password toggle functionality
        document.querySelectorAll('.password-toggle').forEach(toggle => {
            toggle.addEventListener('click', function() {
                const input = this.previousElementSibling;
                const type = input.getAttribute('type') === 'password' ? 'text' : 'password';
                input.setAttribute('type', type);
                this.classList.toggle('fa-eye');
                this.classList.toggle('fa-eye-slash');
            });
        });

        // Show message function
        function showMessage(text, type) {
            messageBox.textContent = text;
            messageBox.className = 'message ' + type;
            setTimeout(() => {
                messageBox.style.display = 'none';
                messageBox.className = 'message';
            }, 5000);
        }

        // Save user to Firestore
        async function saveUserToFirestore(user, fullName = null) {
            try {
                const userRef = db.collection('users').doc(user.uid);
                const doc = await userRef.get();
                
                if (!doc.exists) {
                    await userRef.set({
                        full_name: fullName || user.displayName || user.email.split('@')[0],
                        email: user.email,
                        created_at: firebase.firestore.FieldValue.serverTimestamp(),
                        total_orders: 0,
                        completed_orders: 0
                    });
                }
            } catch (error) {
                console.error('Error saving user:', error);
            }
        }

        // Google Sign-In Handler
        async function handleGoogleSignIn() {
            const btn = this;
            const originalText = btn.innerHTML;
            
            btn.disabled = true;
            btn.innerHTML = '<span class="loading-spinner"></span> Connecting...';
            
            try {
                const result = await auth.signInWithPopup(googleProvider);
                await saveUserToFirestore(result.user);
                
                const message = result.additionalUserInfo?.isNewUser 
                    ? '✅ Account created successfully! Redirecting...' 
                    : '✅ Welcome back! Redirecting...';
                
                showMessage(message, 'success');
                
                setTimeout(() => {
                    window.location.href = 'dashboard.html';
                }, 1500);
                
            } catch (error) {
                btn.disabled = false;
                btn.innerHTML = originalText;
                console.error('Google Sign-In Error:', error);
                
                if (error.code === 'auth/popup-blocked') {
                    showMessage('Popup was blocked. Please allow popups for this site.', 'error');
                } else if (error.code === 'auth/popup-closed-by-user') {
                    // User closed popup - no message needed
                } else if (error.code === 'auth/unauthorized-domain') {
                    showMessage('This domain is not authorized. Please contact support.', 'error');
                } else {
                    showMessage(error.message, 'error');
                }
            }
        }

        // Attach Google Sign-In handlers
        googleLoginBtn.addEventListener('click', handleGoogleSignIn);
        googleSignupBtn.addEventListener('click', handleGoogleSignIn);

        // Tab switching
        loginTab.addEventListener('click', () => {
            loginTab.classList.add('active');
            signupTab.classList.remove('active');
            loginForm.classList.remove('hidden');
            signupForm.classList.add('hidden');
            messageBox.style.display = 'none';
            messageBox.className = 'message';
        });

        signupTab.addEventListener('click', () => {
            signupTab.classList.add('active');
            loginTab.classList.remove('active');
            signupForm.classList.remove('hidden');
            loginForm.classList.add('hidden');
            messageBox.style.display = 'none';
            messageBox.className = 'message';
        });

        // Email/Password Login
        loginBtn.addEventListener('click', async () => {
            const email = document.getElementById('loginEmail').value.trim();
            const password = document.getElementById('loginPassword').value;
            
            if (!email || !password) {
                showMessage('Please fill in all fields', 'error');
                return;
            }
            
            loginBtn.disabled = true;
            loginBtn.innerHTML = '<span class="loading-spinner"></span> Logging in...';
            
            try {
                const userCredential = await auth.signInWithEmailAndPassword(email, password);
                await saveUserToFirestore(userCredential.user);
                showMessage('✅ Login successful! Redirecting...', 'success');
                
                setTimeout(() => {
                    window.location.href = 'dashboard.html';
                }, 1500);
                
            } catch (error) {
                loginBtn.disabled = false;
                loginBtn.textContent = 'Login';
                console.error('Login Error:', error);
                
                if (error.code === 'auth/user-not-found') {
                    showMessage('No account found with this email', 'error');
                } else if (error.code === 'auth/wrong-password') {
                    showMessage('Incorrect password', 'error');
                } else if (error.code === 'auth/invalid-email') {
                    showMessage('Please enter a valid email address', 'error');
                } else if (error.code === 'auth/too-many-requests') {
                    showMessage('Too many failed attempts. Please try again later.', 'error');
                } else {
                    showMessage(error.message, 'error');
                }
            }
        });

        // Signup Handler
        signupBtn.addEventListener('click', async () => {
            const name = document.getElementById('signupName').value.trim();
            const email = document.getElementById('signupEmail').value.trim();
            const password = document.getElementById('signupPassword').value;
            const confirmPassword = document.getElementById('signupConfirmPassword').value;
            
            // Validation
            if (!name || !email || !password || !confirmPassword) {
                showMessage('Please fill in all fields', 'error');
                return;
            }
            
            if (name.length < 2) {
                showMessage('Please enter your full name', 'error');
                return;
            }
            
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!emailRegex.test(email)) {
                showMessage('Please enter a valid email address', 'error');
                return;
            }
            
            if (password.length < 6) {
                showMessage('Password must be at least 6 characters', 'error');
                return;
            }
            
            if (password !== confirmPassword) {
                showMessage('Passwords do not match', 'error');
                return;
            }
            
            signupBtn.disabled = true;
            signupBtn.innerHTML = '<span class="loading-spinner"></span> Creating Account...';
            
            try {
                const userCredential = await auth.createUserWithEmailAndPassword(email, password);
                
                // Update profile with name
                await userCredential.user.updateProfile({
                    displayName: name
                });
                
                // Save to Firestore
                await saveUserToFirestore(userCredential.user, name);
                
                showMessage('✅ Account created successfully! Redirecting...', 'success');
                
                setTimeout(() => {
                    window.location.href = 'dashboard.html';
                }, 2000);
                
            } catch (error) {
                signupBtn.disabled = false;
                signupBtn.textContent = 'Create Account';
                console.error('Signup Error:', error);
                
                if (error.code === 'auth/email-already-in-use') {
                    showMessage('This email is already registered. Please login instead.', 'error');
                } else if (error.code === 'auth/invalid-email') {
                    showMessage('Please enter a valid email address', 'error');
                } else if (error.code === 'auth/weak-password') {
                    showMessage('Password is too weak. Please use a stronger password.', 'error');
                } else {
                    showMessage(error.message, 'error');
                }
            }
        });

        // Forgot Password Handler
        forgotBtn.addEventListener('click', async () => {
            const email = document.getElementById('loginEmail').value.trim();
            
            if (!email) {
                showMessage('Please enter your email address first', 'error');
                return;
            }
            
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!emailRegex.test(email)) {
                showMessage('Please enter a valid email address', 'error');
                return;
            }
            
            forgotBtn.style.pointerEvents = 'none';
            forgotBtn.style.opacity = '0.5';
            
            try {
                await auth.sendPasswordResetEmail(email);
                showMessage('✅ Password reset email sent! Check your inbox.', 'success');
            } catch (error) {
                console.error('Password Reset Error:', error);
                
                if (error.code === 'auth/user-not-found') {
                    showMessage('No account found with this email', 'error');
                } else {
                    showMessage(error.message, 'error');
                }
            } finally {
                setTimeout(() => {
                    forgotBtn.style.pointerEvents = 'auto';
                    forgotBtn.style.opacity = '1';
                }, 3000);
            }
        });

        // Enter key support for forms
        document.getElementById('loginPassword').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') loginBtn.click();
        });
        
        document.getElementById('loginEmail').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') loginBtn.click();
        });
        
        document.getElementById('signupConfirmPassword').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') signupBtn.click();
        });

        // Check if already logged in
        auth.onAuthStateChanged((user) => {
            if (user && window.location.pathname.includes('login.html')) {
                window.location.href = 'dashboard.html';
            }
        });

        // Clear messages on input focus
        document.querySelectorAll('input').forEach(input => {
            input.addEventListener('focus', () => {
                messageBox.style.display = 'none';
                messageBox.className = 'message';
            });
        });
    </script>
</body>
</html>
