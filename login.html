<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | ShredFX</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --frosted-mint: #d8f3dcff;
            --celadon: #b7e4c7ff;
            --celadon-2: #95d5b2ff;
            --mint-leaf: #74c69dff;
            --mint-leaf-2: #52b788ff;
            --sea-green: #40916cff;
            --dark-emerald: #2d6a4fff;
            --pine-teal: #1b4332ff;
            --evergreen: #081c15ff;
            --gradient: linear-gradient(135deg, var(--mint-leaf) 0%, var(--sea-green) 100%);
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, var(--frosted-mint) 0%, var(--celadon) 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .auth-container {
            width: 100%;
            max-width: 450px;
        }

        .auth-card {
            background: white;
            border-radius: 32px;
            padding: 40px 30px;
            box-shadow: 0 20px 40px rgba(29, 67, 50, 0.2);
            border: 3px solid var(--mint-leaf);
        }

        .auth-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .auth-header img {
            height: 70px;
            margin-bottom: 15px;
            filter: drop-shadow(0 5px 10px rgba(82, 183, 136, 0.3));
        }

        .auth-header h2 {
            font-size: 2rem;
            color: var(--evergreen);
            font-family: 'Archivo Black', sans-serif;
            letter-spacing: -0.5px;
        }

        .fx {
            color: var(--sea-green);
        }

        .auth-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            background: var(--frosted-mint);
            padding: 5px;
            border-radius: 50px;
        }

        .auth-tab {
            flex: 1;
            padding: 12px;
            border: none;
            background: transparent;
            font-weight: 600;
            font-size: 1rem;
            border-radius: 50px;
            cursor: pointer;
            transition: 0.2s;
            color: var(--pine-teal);
        }

        .auth-tab.active {
            background: white;
            color: var(--dark-emerald);
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .auth-form {
            display: none;
        }

        .auth-form.active {
            display: block;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--dark-emerald);
            font-size: 0.9rem;
        }

        .form-group input {
            width: 100%;
            padding: 15px;
            background: var(--frosted-mint);
            border: 2px solid var(--celadon-2);
            border-radius: 16px;
            font-size: 1rem;
            transition: 0.2s;
            font-family: 'Poppins', sans-serif;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--sea-green);
            background: white;
            box-shadow: 0 0 0 4px rgba(64, 145, 108, 0.1);
        }

        .auth-btn {
            width: 100%;
            padding: 16px;
            background: var(--gradient);
            color: white;
            border: none;
            border-radius: 40px;
            font-weight: 800;
            font-size: 1.1rem;
            cursor: pointer;
            margin-top: 10px;
            transition: 0.2s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .auth-btn:hover {
            transform: scale(1.02);
            box-shadow: 0 10px 20px rgba(64, 145, 108, 0.3);
        }

        .message {
            text-align: center;
            margin-top: 20px;
            padding: 12px;
            border-radius: 12px;
            display: none;
            font-weight: 500;
        }

        .message.error {
            background: #ffebee;
            color: #c62828;
            display: block;
            border: 1px solid #ffcdd2;
        }

        .message.success {
            background: #e8f5e9;
            color: #2e7d32;
            display: block;
            border: 1px solid #c8e6c9;
        }

        .back-link {
            text-align: center;
            margin-top: 25px;
        }

        .back-link a {
            color: var(--sea-green);
            text-decoration: none;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }

        .back-link a:hover {
            text-decoration: underline;
        }

        .forgot-link {
            text-align: right;
            margin-top: 5px;
        }

        .forgot-link a {
            color: var(--pine-teal);
            text-decoration: none;
            font-size: 0.85rem;
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <img src="https://ik.imagekit.io/5xwchyocd7/New%20Project%202%20_2B803B3_.png" alt="ShredFX Logo">
                <h2>SHRED<span class="fx">FX</span></h2>
            </div>
            
            <div class="auth-tabs">
                <button class="auth-tab active" onclick="switchTab('login')">Login</button>
                <button class="auth-tab" onclick="switchTab('signup')">Sign Up</button>
            </div>
            
            <!-- Login Form -->
            <div id="loginForm" class="auth-form active">
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="loginEmail" placeholder="your@email.com">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="loginPassword" placeholder="••••••••">
                </div>
                <div class="forgot-link">
                    <a href="#" onclick="forgotPassword()">Forgot password?</a>
                </div>
                <button class="auth-btn" onclick="handleLogin()">Login</button>
            </div>
            
            <!-- Signup Form -->
            <div id="signupForm" class="auth-form">
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" id="signupName" placeholder="John Doe">
                </div>
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="signupEmail" placeholder="your@email.com">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="signupPassword" placeholder="••••••••">
                </div>
                <button class="auth-btn" onclick="handleSignup()">Create Account</button>
            </div>
            
            <div id="messageBox" class="message"></div>
            
            <div class="back-link">
                <a href="index.html"><i class="fas fa-arrow-left"></i> Back to Home</a>
            </div>
        </div>
    </div>

    <!-- Supabase Library -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <script>
        // Initialize Supabase - USE YOUR CREDENTIALS
        const supabaseUrl = 'https://veqfqexjjowjgdaecljt.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZlcWZxZXhqam93amdkYWVjbGp0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDE2OTg0OTMsImV4cCI6MjA1NzI3NDQ5M30.p3wMhK8BunQJThfB5TQ5kHRDSCHeewyrvHqN9o9QwBw';
        
        const supabase = supabase.createClient(supabaseUrl, supabaseKey);

        // Switch between Login and Signup tabs
        function switchTab(tab) {
            const loginTab = document.querySelectorAll('.auth-tab')[0];
            const signupTab = document.querySelectorAll('.auth-tab')[1];
            const loginForm = document.getElementById('loginForm');
            const signupForm = document.getElementById('signupForm');
            
            if (tab === 'login') {
                loginTab.classList.add('active');
                signupTab.classList.remove('active');
                loginForm.classList.add('active');
                signupForm.classList.remove('active');
            } else {
                signupTab.classList.add('active');
                loginTab.classList.remove('active');
                signupForm.classList.add('active');
                loginForm.classList.remove('active');
            }
            
            // Clear message
            document.getElementById('messageBox').style.display = 'none';
        }

        // Handle Login
        async function handleLogin() {
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            const messageBox = document.getElementById('messageBox');
            
            if (!email || !password) {
                showMessage('Please fill in all fields', 'error');
                return;
            }
            
            try {
                const { data, error } = await supabase.auth.signInWithPassword({
                    email: email,
                    password: password
                });
                
                if (error) {
                    showMessage(error.message, 'error');
                } else {
                    showMessage('Login successful! Redirecting...', 'success');
                    setTimeout(() => {
                        window.location.href = 'dashboard.html';
                    }, 1500);
                }
            } catch (err) {
                showMessage('Something went wrong', 'error');
            }
        }

        // Handle Signup
        async function handleSignup() {
            const name = document.getElementById('signupName').value;
            const email = document.getElementById('signupEmail').value;
            const password = document.getElementById('signupPassword').value;
            const messageBox = document.getElementById('messageBox');
            
            if (!name || !email || !password) {
                showMessage('Please fill in all fields', 'error');
                return;
            }
            
            if (password.length < 6) {
                showMessage('Password must be at least 6 characters', 'error');
                return;
            }
            
            try {
                const { data, error } = await supabase.auth.signUp({
                    email: email,
                    password: password,
                    options: {
                        data: {
                            full_name: name
                        }
                    }
                });
                
                if (error) {
                    showMessage(error.message, 'error');
                } else {
                    showMessage('Account created! Check your email for confirmation.', 'success');
                    setTimeout(() => {
                        switchTab('login');
                    }, 3000);
                }
            } catch (err) {
                showMessage('Something went wrong', 'error');
            }
        }

        // Forgot Password
        async function forgotPassword() {
            const email = prompt('Enter your email address:');
            if (!email) return;
            
            try {
                const { data, error } = await supabase.auth.resetPasswordForEmail(email);
                
                if (error) {
                    alert('Error: ' + error.message);
                } else {
                    alert('Password reset email sent! Check your inbox.');
                }
            } catch (err) {
                alert('Something went wrong');
            }
        }

        // Show message function
        function showMessage(text, type) {
            const messageBox = document.getElementById('messageBox');
            messageBox.textContent = text;
            messageBox.className = 'message ' + type;
        }

        // Check if user is already logged in
        async function checkUser() {
            const { data: { user } } = await supabase.auth.getUser();
            if (user) {
                // Already logged in, redirect to dashboard
                window.location.href = 'dashboard.html';
            }
        }

        // Run on page load
        checkUser();
    </script>
</body>
</html>
