<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | ShredFX</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --frosted-mint: #d8f3dcff;
            --celadon: #b7e4c7ff;
            --celadon-2: #95d5b2ff;
            --mint-leaf: #74c69dff;
            --mint-leaf-2: #52b788ff;
            --sea-green: #40916cff;
            --dark-emerald: #2d6a4fff;
            --pine-teal: #1b4332ff;
            --evergreen: #081c15ff;
            --gradient: linear-gradient(135deg, var(--mint-leaf) 0%, var(--sea-green) 100%);
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, var(--frosted-mint) 0%, var(--celadon) 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .auth-container {
            width: 100%;
            max-width: 450px;
        }

        .auth-card {
            background: white;
            border-radius: 32px;
            padding: 40px 30px;
            box-shadow: 0 20px 40px rgba(29, 67, 50, 0.2);
            border: 3px solid var(--mint-leaf);
        }

        .auth-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .auth-header img {
            height: 70px;
            margin-bottom: 15px;
        }

        .auth-header h2 {
            font-size: 2rem;
            color: var(--evergreen);
            font-family: 'Archivo Black', sans-serif;
        }

        .fx {
            color: var(--sea-green);
        }

        .auth-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            background: var(--frosted-mint);
            padding: 5px;
            border-radius: 50px;
        }

        .auth-tab {
            flex: 1;
            padding: 12px;
            border: none;
            background: transparent;
            font-weight: 600;
            font-size: 1rem;
            border-radius: 50px;
            cursor: pointer;
            color: var(--pine-teal);
        }

        .auth-tab.active {
            background: white;
            color: var(--dark-emerald);
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .auth-form {
            display: none;
        }

        .auth-form.active {
            display: block;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--dark-emerald);
        }

        .form-group input {
            width: 100%;
            padding: 15px;
            background: var(--frosted-mint);
            border: 2px solid var(--celadon-2);
            border-radius: 16px;
            font-size: 1rem;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--sea-green);
            background: white;
        }

        .auth-btn {
            width: 100%;
            padding: 16px;
            background: var(--gradient);
            color: white;
            border: none;
            border-radius: 40px;
            font-weight: 800;
            font-size: 1.1rem;
            cursor: pointer;
            margin-top: 10px;
        }

        .auth-btn:hover {
            transform: scale(1.02);
        }

        .message {
            text-align: center;
            margin-top: 20px;
            padding: 12px;
            border-radius: 12px;
            display: none;
        }

        .message.error {
            background: #ffebee;
            color: #c62828;
            display: block;
        }

        .message.success {
            background: #e8f5e9;
            color: #2e7d32;
            display: block;
        }

        .back-link {
            text-align: center;
            margin-top: 25px;
        }

        .back-link a {
            color: var(--sea-green);
            text-decoration: none;
            font-weight: 600;
        }

        .forgot-link {
            text-align: right;
            margin-top: 5px;
        }

        .forgot-link button {
            background: none;
            border: none;
            color: var(--pine-teal);
            cursor: pointer;
            font-size: 0.85rem;
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <img src="https://ik.imagekit.io/5xwchyocd7/New%20Project%202%20_2B803B3_.png">
                <h2>SHRED<span class="fx">FX</span></h2>
            </div>
            
            <div class="auth-tabs">
                <button class="auth-tab active" id="loginTab">Login</button>
                <button class="auth-tab" id="signupTab">Sign Up</button>
            </div>
            
            <!-- Login Form -->
            <div id="loginForm" class="auth-form active">
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="loginEmail" placeholder="your@email.com">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="loginPassword" placeholder="••••••••">
                </div>
                <div class="forgot-link">
                    <button id="forgotBtn">Forgot password?</button>
                </div>
                <button class="auth-btn" id="loginBtn">Login</button>
            </div>
            
            <!-- Signup Form -->
            <div id="signupForm" class="auth-form">
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" id="signupName" placeholder="John Doe">
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="signupEmail" placeholder="your@email.com">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="signupPassword" placeholder="••••••••">
                </div>
                <button class="auth-btn" id="signupBtn">Create Account</button>
            </div>
            
            <div id="messageBox" class="message"></div>
            
            <div class="back-link">
                <a href="index.html">← Back to Home</a>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <script>
        // Initialize Supabase
        const supabaseUrl = 'https://veqfqexjjowjgdaecljt.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZlcWZxZXhqam93amdkYWVjbGp0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDE2OTg0OTMsImV4cCI6MjA1NzI3NDQ5M30.p3wMhK8BunQJThfB5TQ5kHRDSCHeewyrvHqN9o9QwBw';
        const supabase = supabase.createClient(supabaseUrl, supabaseKey);

        // Get elements
        const loginTab = document.getElementById('loginTab');
        const signupTab = document.getElementById('signupTab');
        const loginForm = document.getElementById('loginForm');
        const signupForm = document.getElementById('signupForm');
        const loginBtn = document.getElementById('loginBtn');
        const signupBtn = document.getElementById('signupBtn');
        const forgotBtn = document.getElementById('forgotBtn');
        const messageBox = document.getElementById('messageBox');

        // Switch tabs
        loginTab.addEventListener('click', () => {
            loginTab.classList.add('active');
            signupTab.classList.remove('active');
            loginForm.classList.add('active');
            signupForm.classList.remove('active');
            messageBox.style.display = 'none';
        });

        signupTab.addEventListener('click', () => {
            signupTab.classList.add('active');
            loginTab.classList.remove('active');
            signupForm.classList.add('active');
            loginForm.classList.remove('active');
            messageBox.style.display = 'none';
        });

        // Show message function
        function showMessage(text, type) {
            messageBox.textContent = text;
            messageBox.className = 'message ' + type;
        }

        // Login
        loginBtn.addEventListener('click', async () => {
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            
            if (!email || !password) {
                showMessage('Please fill all fields', 'error');
                return;
            }
            
            showMessage('Logging in...', 'success');
            
            const { data, error } = await supabase.auth.signInWithPassword({
                email: email,
                password: password
            });
            
            if (error) {
                showMessage(error.message, 'error');
            } else {
                showMessage('Login successful! Redirecting...', 'success');
                setTimeout(() => {
                    window.location.href = 'dashboard.html';
                }, 1500);
            }
        });

        // Signup
        signupBtn.addEventListener('click', async () => {
            const name = document.getElementById('signupName').value;
            const email = document.getElementById('signupEmail').value;
            const password = document.getElementById('signupPassword').value;
            
            if (!name || !email || !password) {
                showMessage('Please fill all fields', 'error');
                return;
            }
            
            if (password.length < 6) {
                showMessage('Password must be at least 6 characters', 'error');
                return;
            }
            
            showMessage('Creating account...', 'success');
            
            const { data, error } = await supabase.auth.signUp({
                email: email,
                password: password,
                options: {
                    data: {
                        full_name: name
                    }
                }
            });
            
            if (error) {
                showMessage(error.message, 'error');
            } else {
                showMessage('Account created! Check your email.', 'success');
                setTimeout(() => {
                    loginTab.click();
                }, 3000);
            }
        });

        // Forgot password
        forgotBtn.addEventListener('click', async () => {
            const email = prompt('Enter your email:');
            if (!email) return;
            
            const { error } = await supabase.auth.resetPasswordForEmail(email);
            
            if (error) {
                alert('Error: ' + error.message);
            } else {
                alert('Password reset email sent!');
            }
        });

        // Check if already logged in
        async function checkUser() {
            const { data: { user } } = await supabase.auth.getUser();
            if (user) {
                window.location.href = 'dashboard.html';
            }
        }
        
        checkUser();
    </script>
</body>
</html>
