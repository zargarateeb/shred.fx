<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | ShredFX</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --frosted-mint: #d8f3dcff;
            --celadon: #b7e4c7ff;
            --celadon-2: #95d5b2ff;
            --mint-leaf: #74c69dff;
            --sea-green: #40916cff;
            --dark-emerald: #2d6a4fff;
            --evergreen: #081c15ff;
            --gradient: linear-gradient(135deg, #74c69d 0%, #40916c 100%);
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #d8f3dc 0%, #b7e4c7 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .auth-container {
            width: 100%;
            max-width: 450px;
        }

        .auth-card {
            background: white;
            border-radius: 32px;
            padding: 40px 30px;
            box-shadow: 0 20px 40px rgba(29, 67, 50, 0.2);
            border: 3px solid #74c69d;
        }

        .auth-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .auth-header img {
            height: 70px;
            margin-bottom: 15px;
        }

        .auth-header h2 {
            font-size: 2rem;
            color: #081c15;
            font-family: 'Archivo Black', sans-serif;
        }

        .fx {
            color: #40916c;
        }

        .tab-container {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            background: #d8f3dc;
            padding: 5px;
            border-radius: 50px;
        }

        .tab-btn {
            flex: 1;
            padding: 12px;
            border: none;
            background: transparent;
            font-weight: 600;
            font-size: 1rem;
            border-radius: 50px;
            cursor: pointer;
            color: #1b4332;
        }

        .tab-btn.active {
            background: white;
            color: #2d6a4f;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .form-container {
            display: block;
        }

        .form-container.hidden {
            display: none;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            color: #2d6a4f;
        }

        .form-group input {
            width: 100%;
            padding: 15px;
            background: #d8f3dc;
            border: 2px solid #95d5b2;
            border-radius: 16px;
            font-size: 1rem;
            font-family: 'Poppins', sans-serif;
        }

        .form-group input:focus {
            outline: none;
            border-color: #40916c;
            background: white;
        }

        .action-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #74c69d 0%, #40916c 100%);
            color: white;
            border: none;
            border-radius: 40px;
            font-weight: 800;
            font-size: 1.1rem;
            cursor: pointer;
            margin-top: 10px;
        }

        .action-btn:hover {
            transform: scale(1.02);
        }

        .message {
            text-align: center;
            margin-top: 20px;
            padding: 12px;
            border-radius: 12px;
            display: none;
        }

        .message.error {
            background: #ffebee;
            color: #c62828;
            display: block;
        }

        .message.success {
            background: #e8f5e9;
            color: #2e7d32;
            display: block;
        }

        .back-link {
            text-align: center;
            margin-top: 25px;
        }

        .back-link a {
            color: #40916c;
            text-decoration: none;
            font-weight: 600;
        }

        .forgot-link {
            text-align: right;
            margin-top: 5px;
        }

        .forgot-link span {
            color: #1b4332;
            font-size: 0.85rem;
            text-decoration: underline;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <img src="https://ik.imagekit.io/5xwchyocd7/New%20Project%202%20_2B803B3_.png">
                <h2>SHRED<span class="fx">FX</span></h2>
            </div>
            
            <div class="tab-container">
                <button class="tab-btn active" id="loginTabBtn">Login</button>
                <button class="tab-btn" id="signupTabBtn">Sign Up</button>
            </div>
            
            <!-- Login Form -->
            <div id="loginForm" class="form-container">
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="loginEmail" placeholder="your@email.com">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="loginPassword" placeholder="••••••••">
                </div>
                <div class="forgot-link">
                    <span id="forgotPassword">Forgot password?</span>
                </div>
                <button class="action-btn" id="loginBtn">Login</button>
            </div>
            
            <!-- Signup Form -->
            <div id="signupForm" class="form-container hidden">
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" id="signupName" placeholder="John Doe">
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="signupEmail" placeholder="your@email.com">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="signupPassword" placeholder="••••••••">
                </div>
                <button class="action-btn" id="signupBtn">Create Account</button>
            </div>
            
            <div id="messageBox" class="message"></div>
            
            <div class="back-link">
                <a href="index.html">← Back to Home</a>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
    // Initialize Supabase
    const supabaseUrl = 'https://veqfqexjjowjgdaecljt.supabase.co';
    const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZlcWZxZXhqam93amdkYWVjbGp0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMyMTI2NjksImV4cCI6MjA4ODc4ODY2OX0.gGKCEChxQowyKRLXumfGpi-LniWdT8jvr_wWcUSSfqg';
    const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);

    // Wait for page to load
    document.addEventListener('DOMContentLoaded', function() {
        console.log('Page loaded');
        
        // Get all elements
        const loginTab = document.getElementById('loginTabBtn');
        const signupTab = document.getElementById('signupTabBtn');
        const loginForm = document.getElementById('loginForm');
        const signupForm = document.getElementById('signupForm');
        const loginBtn = document.getElementById('loginBtn');
        const signupBtn = document.getElementById('signupBtn');
        const forgotBtn = document.getElementById('forgotPassword');
        const messageBox = document.getElementById('messageBox');

        // Show message function
        function showMessage(text, type) {
            messageBox.textContent = text;
            messageBox.className = 'message ' + type;
        }

        // Tab switching
        loginTab.addEventListener('click', function() {
            loginTab.classList.add('active');
            signupTab.classList.remove('active');
            loginForm.classList.remove('hidden');
            signupForm.classList.add('hidden');
            messageBox.style.display = 'none';
        });

        signupTab.addEventListener('click', function() {
            signupTab.classList.add('active');
            loginTab.classList.remove('active');
            signupForm.classList.remove('hidden');
            loginForm.classList.add('hidden');
            messageBox.style.display = 'none';
        });

        // Login
        loginBtn.addEventListener('click', async function(e) {
            e.preventDefault();
            
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            
            if (!email || !password) {
                showMessage('Please fill all fields', 'error');
                return;
            }
            
            // Disable button and show loading
            loginBtn.disabled = true;
            loginBtn.textContent = 'Logging in...';
            showMessage('Checking credentials...', 'success');
            
            const { data, error } = await supabaseClient.auth.signInWithPassword({
                email: email,
                password: password
            });
            
            if (error) {
                loginBtn.disabled = false;
                loginBtn.textContent = 'Login';
                showMessage(error.message, 'error');
            } else {
                showMessage('✓ Login successful! Redirecting...', 'success');
                setTimeout(() => {
                    window.location.href = 'dashboard.html';
                }, 1500);
            }
        });

        // Signup - WITH SUCCESS MESSAGE
        signupBtn.addEventListener('click', async function(e) {
            e.preventDefault(); // Stop page refresh
            
            const name = document.getElementById('signupName').value;
            const email = document.getElementById('signupEmail').value;
            const password = document.getElementById('signupPassword').value;
            
            if (!name || !email || !password) {
                showMessage('Please fill all fields', 'error');
                return;
            }
            
            if (password.length < 6) {
                showMessage('Password must be at least 6 characters', 'error');
                return;
            }
            
            // Disable button and show loading
            signupBtn.disabled = true;
            signupBtn.textContent = 'Creating Account...';
            showMessage('Creating your account...', 'success');
            
            const { data, error } = await supabaseClient.auth.signUp({
                email: email,
                password: password,
                options: {
                    data: {
                        full_name: name
                    }
                }
            });
            
            if (error) {
                signupBtn.disabled = false;
                signupBtn.textContent = 'Create Account';
                showMessage(error.message, 'error');
            } else {
                // Clear form
                document.getElementById('signupName').value = '';
                document.getElementById('signupEmail').value = '';
                document.getElementById('signupPassword').value = '';
                
                // Show BIG success message
                showMessage('✅ ACCOUNT CREATED SUCCESSFULLY! Please check your email to confirm your account.', 'success');
                
                // Re-enable button
                signupBtn.disabled = false;
                signupBtn.textContent = 'Create Account';
                
                // Auto switch to login tab after 3 seconds
                setTimeout(() => {
                    loginTab.click();
                    showMessage('You can now login with your credentials', 'success');
                }, 3000);
            }
        });

        // Forgot password
        forgotBtn.addEventListener('click', async function() {
            const email = prompt('Enter your email:');
            if (!email) return;
            
            showMessage('Sending reset email...', 'success');
            
            const { error } = await supabaseClient.auth.resetPasswordForEmail(email);
            
            if (error) {
                showMessage(error.message, 'error');
            } else {
                showMessage('✓ Password reset email sent! Check your inbox.', 'success');
            }
        });

        // Check if already logged in
        async function checkUser() {
            const { data: { user } } = await supabaseClient.auth.getUser();
            if (user) {
                window.location.href = 'dashboard.html';
            }
        }
        
        checkUser();
    });
</script>
</body>
</html>
